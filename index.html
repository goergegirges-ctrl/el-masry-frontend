<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El-Masry Electronics | المصري للشاشات والكاميرات</title>
    <meta name="description" content="المصري إلكترونك لبيع قطع غيار الشاشات والكاميرات والليدات بأفضل سعر في مصر" />
    <meta name="keywords" content="المصري, المصرى للشاشات, كوفات, ليدات, تيكونات, بورد, مساطر شاشات, El-Masry Electronics" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="El-Masry Electronics | المصري للشاشات والكاميرات" />
    <meta property="og:description" content="المصري إلكترونك لبيع قطع غيار الشاشات والكاميرات والليدات بأفضل سعر في مصر" />
    <meta property="og:image" content="/favicon.svg" />

    <script>
      (function () {
        var l = localStorage.getItem('elmasry-lang') || 'ar';
        document.documentElement.lang = l;
        document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
      })();
    </script>
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
